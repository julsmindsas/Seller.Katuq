<div class="notas m-t-25">
  <div class="accordion" id="notasAccordion">
    <!-- Notas de Producción -->
    <div class="accordion-item">
      <h2 class="accordion-header">
        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#notasProduccion" aria-expanded="false">
          <i class="fa fa-cogs me-2"></i> Notas de Producción
        </button>
      </h2>
      <div id="notasProduccion" class="accordion-collapse collapse">
        <div class="accordion-body p-2">
          <form [formGroup]="notasProduccionForm">
            <div formArrayName="productos">
              <div *ngFor="let productoCtrl of notasFormArray.controls; let i = index" class="mb-3">
                <div [formGroupName]="i">
                  <div class="card">
                    <div class="card-header py-2 bg-light">
                      <h6 class="mb-0">{{ this.pedido.carrito[i].producto?.crearProducto?.titulo }}</h6>
                    </div>
                    <div class="card-body p-2">
                      <div formArrayName="notas">
                        <div *ngFor="let notaCtrl of getProductNotesArray(i).controls; let j = index" class="mb-2">
                          <div class="input-group input-group-sm">
                            <input [formControlName]="j" class="form-control" placeholder="Nota para el producto">
                            <button type="button" class="btn btn-outline-danger btn-sm" (click)="removeNote(i, j)">
                              <i class="fa fa-times"></i>
                            </button>
                          </div>
                        </div>
                      </div>
                      <button type="button" class="btn btn-sm btn-outline-primary mt-2" (click)="agregarNota(i)">
                        <i class="fa fa-plus"></i> Añadir nota
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div class="text-end mt-2">
              <button type="button" class="btn btn-sm btn-primary" (click)="guardarNotas()">
                <i class="fa fa-save"></i> Guardar Notas
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Notas de Cliente -->
    <div class="accordion-item">
      <h2 class="accordion-header">
        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#notasCliente" aria-expanded="false">
          <i class="fa fa-user me-2"></i> Notas de Cliente
        </button>
      </h2>
      <div id="notasCliente" class="accordion-collapse collapse">
        <div class="accordion-body p-2">
          <form [formGroup]="notasClienteForm" (ngSubmit)="onSubmitCliente()" class="mb-2">
            <textarea formControlName="nota" class="form-control form-control-sm mb-2" rows="2" placeholder="Escribir nota al cliente"></textarea>
            <div class="text-end">
              <button type="submit" class="btn btn-sm btn-primary" [disabled]="notasClienteForm.invalid">
                <i class="fa fa-plus-circle"></i> Agregar
              </button>
            </div>
          </form>

          <div *ngIf="pedido.notasPedido?.notasCliente && pedido.notasPedido?.notasCliente.length > 0">
            <ul class="list-group list-group-flush">
              <li class="list-group-item p-2" *ngFor="let nota of notasClienteOrdenadas; let i = index">
                <div class="d-flex justify-content-between">
                  <div>
                    <small class="text-muted">{{nota.fecha | date:'short'}}</small>
                    <p class="mb-0">{{nota.nota}}</p>
                  </div>
                  <div>
                    <span class="fa fa-trash text-danger" style="cursor:pointer" (click)="eliminarNota(i, 'cliente')"></span>
                  </div>
                </div>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>

    <!-- Notas de Despacho -->
    <div class="accordion-item">
      <h2 class="accordion-header">
        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#notasDespacho" aria-expanded="false">
          <i class="fa fa-truck me-2"></i> Notas de Despacho
        </button>
      </h2>
      <div id="notasDespacho" class="accordion-collapse collapse">
        <div class="accordion-body p-2">
          <form [formGroup]="notasDespachoForm" (ngSubmit)="onSubmitDespachos()" class="mb-2">
            <textarea formControlName="nota" class="form-control form-control-sm mb-2" rows="2" placeholder="Escribir nota de despacho"></textarea>
            <div class="text-end">
              <button type="submit" class="btn btn-sm btn-primary" [disabled]="notasDespachoForm.invalid">
                <i class="fa fa-plus-circle"></i> Agregar
              </button>
            </div>
          </form>

          <div *ngIf="notasDespachos && notasDespachos.length > 0">
            <ul class="list-group list-group-flush">
              <li class="list-group-item p-2" *ngFor="let nota of notasDespachosOrdenadas; let i = index">
                <div class="d-flex justify-content-between">
                  <div>
                    <small class="text-muted">{{nota.fecha | date:'short'}}</small>
                    <p class="mb-0">{{nota.nota}}</p>
                  </div>
                  <div>
                    <span class="fa fa-trash text-danger" style="cursor:pointer" (click)="eliminarNota(i, 'despachos')"></span>
                  </div>
                </div>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>

    <!-- Notas de Entrega -->
    <div class="accordion-item">
      <h2 class="accordion-header">
        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#notasEntrega" aria-expanded="false">
          <i class="fa fa-home me-2"></i> Notas de Entrega
        </button>
      </h2>
      <div id="notasEntrega" class="accordion-collapse collapse">
        <div class="accordion-body p-2">
          <form [formGroup]="notasEntregasForm" (ngSubmit)="onSubmitEntregas()" class="mb-2">
            <textarea formControlName="nota" class="form-control form-control-sm mb-2" rows="2" placeholder="Escribir nota para entrega"></textarea>
            <div class="text-end">
              <button type="submit" class="btn btn-sm btn-primary" [disabled]="notasEntregasForm.invalid">
                <i class="fa fa-plus-circle"></i> Agregar
              </button>
            </div>
          </form>

          <div *ngIf="notasEntregas && notasEntregas.length > 0">
            <ul class="list-group list-group-flush">
              <li class="list-group-item p-2" *ngFor="let nota of notasEntregasOrdenadas; let i = index">
                <div class="d-flex justify-content-between">
                  <div>
                    <small class="text-muted">{{nota.fecha | date:'short'}}</small>
                    <p class="mb-0">{{nota.nota}}</p>
                  </div>
                  <div>
                    <span class="fa fa-trash text-danger" style="cursor:pointer" (click)="eliminarNota(i, 'entregas')"></span>
                  </div>
                </div>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Notas de Facturación y Pagos -->
    <div class="accordion-item">
      <h2 class="accordion-header">
        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#notasPagos" aria-expanded="false">
          <i class="fa fa-money me-2"></i> Notas de Facturación y Pagos
        </button>
      </h2>
      <div id="notasPagos" class="accordion-collapse collapse">
        <div class="accordion-body p-2">
          <form [formGroup]="notasFacturacionPagosForm" (ngSubmit)="onSubmitFacturacionPagos()" class="mb-2">
            <textarea formControlName="nota" class="form-control form-control-sm mb-2" rows="2" placeholder="Escribir nota de facturación"></textarea>
            <div class="text-end">
              <button type="submit" class="btn btn-sm btn-primary" [disabled]="notasFacturacionPagosForm.invalid">
                <i class="fa fa-plus-circle"></i> Agregar
              </button>
            </div>
          </form>

          <div *ngIf="notasFacturacionPagos && notasFacturacionPagos.length > 0">
            <ul class="list-group list-group-flush">
              <li class="list-group-item p-2" *ngFor="let nota of notasFacturacionPagosOrdenadas; let i = index">
                <div class="d-flex justify-content-between">
                  <div>
                    <small class="text-muted">{{nota.fecha | date:'short'}}</small>
                    <p class="mb-0">{{nota.nota}}</p>
                  </div>
                  <div>
                    <span class="fa fa-trash text-danger" style="cursor:pointer" (click)="eliminarNota(i, 'facturacionPagos')"></span>
                  </div>
                </div>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
